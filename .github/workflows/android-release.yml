name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Get version from constants.py
      - name: Get version from constants.py
        id: version
        run: |
          VERSION=$(python3 -c "from app_src.utils.constants import VERSION; print(VERSION)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # 3️⃣ Decode keystore from base64
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      # 4️⃣ Install system dependencies & Python packages
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
              pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade Cython==0.29.33 virtualenv buildozer android-widgets
        shell: bash

      # 5️⃣ Build Release APK with Buildozer
      - name: Build APK
        run: |
          source venv/bin/activate
          buildozer -v android release
        shell: bash

      # 6️⃣ Zipalign APK
      - name: Zipalign APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          echo "Using build-tools: $BUILD_TOOLS"
          "$BUILD_TOOLS/zipalign" -v -p 4 bin/*release-unsigned.apk bin/aligned.apk
        shell: bash

      # 7️⃣ Sign APK using apksigner
      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          echo "Signing APK with apksigner from $BUILD_TOOLS"
          "$BUILD_TOOLS/apksigner" sign \
            --ks my-release-key.jks \
            --ks-key-alias key-stuff \
            --ks-pass pass:${{ secrets.KS_PASS }} \
            --key-pass pass:${{ secrets.KEY_PASS }} \
            --out bin/waller.apk \
            bin/aligned.apk
        shell: bash

      # 8️⃣ Verify APK
      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          "$BUILD_TOOLS/apksigner" verify --verbose bin/waller.apk
        shell: bash

      # 9️⃣ Upload APK as release artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waller-apk
          path: bin/waller.apk