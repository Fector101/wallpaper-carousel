name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install packages exactly like your local machine
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev

      # Add ~/.local/bin to PATH like your .bashrc
      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Create virtualenv exactly like you do locally
      - name: Create Python virtual environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 virtualenv buildozer

      # Accept Android SDK licenses automatically
      - name: Accept Android licenses
        run: |
          yes | buildozer android update || true

      # Decode keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      # Build APK
      - name: Build release APK
        run: |
          source venv/bin/activate
          buildozer -v android release

      # Find APK
      - name: Find APK
        id: apk
        run: |
          APK=$(find ./bin -name "*release*.apk" | head -n 1)
          echo "APK=$APK" >> $GITHUB_OUTPUT

      # Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waller-apk
          path: ${{ steps.apk.outputs.APK }}

      # Create GitHub release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-build-${{ github.run_number }}
          name: Auto Build ${{ github.run_number }}
          files: ${{ steps.apk.outputs.APK }}