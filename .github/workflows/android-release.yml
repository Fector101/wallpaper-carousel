name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Read version from constants.py
      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "from app_src.utils.constants import VERSION; print(VERSION)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Install system dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            openjdk-17-jdk

      # Install Buildozer
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      # Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.jks

      # Build APK
      - name: Build release APK
        run: |
          buildozer -v android release

      # Find APK
      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find ./bin -name "*-release-unsigned.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      # Zipalign
      - name: Zipalign APK
        run: |
          BUILD_TOOLS=$(find ~/.buildozer/android/platform/android-sdk/build-tools -maxdepth 1 -type d | sort -V | tail -n1)
          APK="${{ steps.apk.outputs.APK_PATH }}"
          ALIGNED="${APK/-unsigned/-aligned.apk}"

          echo "Using build-tools: $BUILD_TOOLS"
          $BUILD_TOOLS/zipalign -v -p 4 "$APK" "$ALIGNED"

      # Sign APK
      - name: Sign APK
        run: |
          BUILD_TOOLS=$(find ~/.buildozer/android/platform/android-sdk/build-tools -maxdepth 1 -type d | sort -V | tail -n1)

          APK="${{ steps.apk.outputs.APK_PATH }}"
          ALIGNED="${APK/-unsigned/-aligned.apk}"
          SIGNED="${APK/-unsigned/-signed.apk}"

          $BUILD_TOOLS/apksigner sign \
            --ks android.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:${{ secrets.KS_PASS }} \
            --key-pass pass:${{ secrets.KEY_PASS }} \
            --out "$SIGNED" \
            "$ALIGNED"

          echo "SIGNED_APK=$SIGNED" >> $GITHUB_ENV

      # Verify APK
      - name: Verify APK
        run: |
          BUILD_TOOLS=$(find ~/.buildozer/android/platform/android-sdk/build-tools -maxdepth 1 -type d | sort -V | tail -n1)
          $BUILD_TOOLS/apksigner verify --verbose "$SIGNED_APK"

      # Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: waller-apk
          path: ${{ env.SIGNED_APK }}

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: ${{ env.SIGNED_APK }}