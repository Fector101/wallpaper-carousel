name: Build Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java 17 (required for sdkmanager)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Install Linux dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libtinfo6 cmake \
            libffi-dev libssl-dev wget

      # Add ~/.local/bin to PATH
      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Python + Buildozer
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer android-widgets

      # Prepare Buildozer SDK folder
      - name: Prepare Android SDK folder
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk

      # Install Android command line tools
      - name: Install Android cmdline tools
        run: |
          cd ~/.buildozer/android/platform/android-sdk

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest || true

          # Buildozer expects old tools/bin/sdkmanager
          mkdir -p tools/bin

          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager tools/bin/sdkmanager
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/avdmanager tools/bin/avdmanager

      # Accept Android licenses
      - name: Accept Android licenses
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses

      # Install build-tools required for aidl
      - name: Install Android build-tools
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "platforms;android-33" "build-tools;34.0.0"

      # Decode keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      # Get version from constants.py
      - name: Get version
        id: version
        run: |
          source venv/bin/activate
          VERSION=$(python -c "from app_src.utils.constants import VERSION; print(VERSION)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      # Build APK
      - name: Build APK
        run: |
          source venv/bin/activate
          pip install android-widgets git+https://github.com/kivy/buildozer legacy-cgi setuptools cython==0.29.34
          buildozer -v android release

      # Find unsigned APK
      - name: Locate APK
        id: apk
        run: |
          APK=$(find ./bin -name "*-release-unsigned.apk" | head -n 1)
          echo "APK=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      # Zipalign APK
      - name: Zipalign APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          $BUILD_TOOLS/zipalign -v -p 4 "${{ steps.apk.outputs.APK }}" bin/aligned.apk

      # Sign APK
      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          echo "Signing APK with $BUILD_TOOLS/apksigner"
          "$BUILD_TOOLS/apksigner" sign \
            --ks my-release-key.jks \
            --ks-key-alias ${{ secrets.ALIAS_NAME }} \
            --ks-pass pass:${{ secrets.KS_PASS }} \
            --key-pass pass:${{ secrets.KEY_PASS }} \
            --out bin/waller.apk \
            bin/aligned.apk

      # Verify APK
      - name: Verify APK
        run: |
          BUILD_TOOLS=$(ls -d ~/.buildozer/android/platform/android-sdk/build-tools/* | sort -V | tail -n1)
          "$BUILD_TOOLS/apksigner" verify --verbose bin/waller.apk

      # Create GitHub release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: .github/version-notes/release-note-v${{ steps.version.outputs.VERSION }}.txt
          files: |
            bin/waller.apk
            .github/version-notes/update-note-v${{ steps.version.outputs.VERSION }}.txt
