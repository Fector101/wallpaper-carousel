name: Build Signed APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Get version from constants.py
      - name: Get version
        id: version
        run: |
          VERSION=$(python -c "from app_src.utils.constants import VERSION; print(VERSION)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # 3️⃣ Decode keystore from Base64
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.jks

      # 4️⃣ Build APK with Buildozer
      - name: Build Release APK
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: 3.11
          buildozer-cmd: buildozer -v android release

      # 5️⃣ Find release APK
      - name: Find release APK
        id: apk
        run: |
          APK_PATH=$(find ./bin -name "*-release-unsigned.apk" | head -n 1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      # 6️⃣ Zipalign APK
      - name: Zipalign APK
        run: |
          ALIGNED_PATH="${{ steps.apk.outputs.APK_PATH/-unsigned/-aligned.apk }}"
          zipalign -v -p 4 "${{ steps.apk.outputs.APK_PATH }}" "$ALIGNED_PATH"

      # 7️⃣ Sign APK with apksigner
      - name: Sign APK
        run: |
          ALIGNED_PATH="${{ steps.apk.outputs.APK_PATH/-unsigned/-aligned.apk }}"
          SIGNED_PATH="${{ steps.apk.outputs.APK_PATH/-unsigned/-signed.apk }}"
          apksigner sign \
            --ks android.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:${{ secrets.KS_PASS }} \
            --key-pass pass:${{ secrets.KEY_PASS }} \
            --out "$SIGNED_PATH" \
            "$ALIGNED_PATH"
          echo "Signed APK: $SIGNED_PATH"

      # 8️⃣ Verify APK
      - name: Verify APK
        run: |
          SIGNED_PATH="${{ steps.apk.outputs.APK_PATH/-unsigned/-signed.apk }}"
          apksigner verify --verbose "$SIGNED_PATH"

      # 9️⃣ Upload signed APK artifact
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ./bin/*-release-signed.apk

      # 🔟 Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          files: ./bin/*-release-signed.apk